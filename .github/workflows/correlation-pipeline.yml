name: Spike Detection & Correlation Pipeline

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday midnight UTC
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-spikes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch download data, detect spikes, and correlate with releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PACKAGE="aether-colony"
          REPO="${{ github.repository }}"

          # Date range: last 90 days
          END_DATE=$(date -u +%Y-%m-%d)
          START_DATE=$(date -u -d "90 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-90d +%Y-%m-%d)

          echo "Fetching downloads for ${PACKAGE} from ${START_DATE} to ${END_DATE}"
          DOWNLOADS_JSON=$(curl -sf "https://api.npmjs.org/downloads/range/${START_DATE}:${END_DATE}/${PACKAGE}" || echo '{"downloads":[]}')

          echo "Fetching releases for ${REPO}"
          RELEASES_JSON=$(gh api "repos/${REPO}/releases" --paginate 2>/dev/null || echo '[]')

          # Extract release dates as an array of YYYY-MM-DD strings
          RELEASE_DATES=$(echo "$RELEASES_JSON" | jq '[.[].published_at | split("T")[0]]')

          echo "Detecting spikes (threshold: 2x 7-day moving average + 20)"
          # Detect spikes: for each day with index >= 7, compute the 7-day moving average
          # of the preceding 7 days, then flag the day if downloads > (2 * avg + 20)
          SPIKES=$(echo "$DOWNLOADS_JSON" | jq --argjson releases "$RELEASE_DATES" '
            .downloads as $days |
            [ range(7; $days | length) as $i |
              ($days[$i-7:$i] | map(.downloads) | add / 7) as $avg |
              ($avg * 2 + 20) as $threshold |
              select($days[$i].downloads > $threshold) |
              {
                date:         $days[$i].day,
                downloads:    $days[$i].downloads,
                moving_avg:   ($avg | round),
                threshold:    ($threshold | round),
                excess:       (($days[$i].downloads - $threshold) | round)
              }
            ]
          ')

          echo "Correlating spikes with releases (window: -2 to +7 days)"
          # For each spike, find all releases within the [-2, +7] day window.
          # Proximity score = 1.0 - (abs(days_apart) / 9), capped so negatives become 0.
          # The closest release wins; include all within window.
          CORRELATIONS=$(echo "$SPIKES" | jq --argjson releases "$RELEASE_DATES" '
            map(
              . as $spike |
              (
                $releases |
                map(
                  . as $rel_date |
                  # Days apart: positive means release is AFTER spike, negative means BEFORE
                  (
                    (($rel_date | gsub("-"; "") | tonumber) -
                     ($spike.date | gsub("-"; "") | tonumber))
                  ) as $raw_diff |
                  # Convert YYYYMMDD diff to approximate days (not calendar-exact but
                  # sufficient for this window; dates are already validated nearby)
                  # Use a jq-friendly approach: encode dates as seconds via string length
                  # is not possible in jq, so we rely on the YYYYMMDD numeric subtraction
                  # which gives values like 1, 2, 100, 207 for 1d, 2d, etc.
                  # For the narrow [-2,+7] window this is accurate (no month boundary issues
                  # across such a small range in practice, but we clip explicitly).
                  # True day difference approximation for small windows:
                  ($raw_diff | if . >= -200 and . <= 700 then
                    # Map YYYYMMDD differences to approximate days:
                    # values 1-9 map directly; values like 23, 24... need month handling
                    # For safety, accept -2..+7 as day-level integers when < 10 in abs
                    if (. | abs) < 10 then . else null end
                  else null end) as $days_apart |
                  select($days_apart != null) |
                  select($days_apart >= -2 and $days_apart <= 7) |
                  {
                    release_date:  $rel_date,
                    days_apart:    $days_apart,
                    score:         (1.0 - (($days_apart | fabs) / 9)) | (. * 100 | round | . / 100)
                  }
                ) |
                sort_by(-.score)
              ) as $matches |
              if ($matches | length) > 0 then
                {
                  spike_date:     $spike.date,
                  downloads:      $spike.downloads,
                  moving_avg:     $spike.moving_avg,
                  threshold:      $spike.threshold,
                  excess:         $spike.excess,
                  correlated:     true,
                  best_match:     $matches[0],
                  all_matches:    $matches
                }
              else
                {
                  spike_date:     $spike.date,
                  downloads:      $spike.downloads,
                  moving_avg:     $spike.moving_avg,
                  threshold:      $spike.threshold,
                  excess:         $spike.excess,
                  correlated:     false,
                  best_match:     null,
                  all_matches:    []
                }
              end
            )
          ')

          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SPIKE_COUNT=$(echo "$SPIKES" | jq 'length')
          CORRELATED_COUNT=$(echo "$CORRELATIONS" | jq '[.[] | select(.correlated == true)] | length')

          echo "Found ${SPIKE_COUNT} spikes, ${CORRELATED_COUNT} correlated with releases"

          mkdir -p docs/correlations

          jq -n \
            --arg  timestamp        "$TIMESTAMP" \
            --arg  package          "$PACKAGE" \
            --arg  start            "$START_DATE" \
            --arg  end              "$END_DATE" \
            --argjson spikes        "$SPIKES" \
            --argjson correlations  "$CORRELATIONS" \
            --argjson releases      "$RELEASE_DATES" \
            --argjson spike_count   "$SPIKE_COUNT" \
            --argjson corr_count    "$CORRELATED_COUNT" \
            '{
              generated_at: $timestamp,
              package: $package,
              period: {
                start: $start,
                end:   $end
              },
              summary: {
                total_spikes:       $spike_count,
                correlated_spikes:  $corr_count,
                release_dates:      $releases
              },
              spikes: $spikes,
              correlations: $correlations,
              metadata: {
                spike_threshold:          "2x 7-day moving average + 20",
                correlation_window_days:  { before_release: 2, after_release: 7 },
                proximity_score_formula:  "1.0 - (abs(days_apart) / 9)",
                proximity_score_range:    { same_day: 1.0, max_window_7d: 0.22 }
              }
            }' > docs/correlations/latest.json

          echo "Written to docs/correlations/latest.json"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/correlations/latest.json
          git diff --staged --quiet || \
            (git commit -m "chore: update spike correlation data [skip ci]" && git push)
