name: Aether CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Validate goreleaser config
        run: goreleaser check

      - name: Build
        run: go build ./cmd/aether

      - name: Vet
        run: go vet ./...

      - name: Run Go tests
        run: go test ./... -count=1 -timeout 300s

      - name: Run Go tests with race detection
        run: go test ./... -race -count=1 -timeout 600s

      - name: Build GoReleaser snapshot
        run: goreleaser build --snapshot --clean

      - name: Binary smoke test
        run: ./dist/Aether_linux_amd64_v1/Aether version

      - name: Verify release metadata sync
        run: |
          test "$(node -p "require('./npm/package.json').version")" = "$(node -p "require('./.aether/version.json').version")"

      - name: Run npm bootstrap tests
        run: npm --prefix npm test

      - name: Parity tests
        run: go test ./cmd/... -run "TestParity|TestGoOnly" -count=1 -timeout 300s -v

      - name: Test summary
        if: always()
        run: |
          echo "Go tests: $(go test ./... -count=1 -timeout 300s -v 2>&1 | grep -c '--- PASS' || echo 'unknown') passed"
