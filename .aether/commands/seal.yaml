name: ant-seal
description: "🏺 Seal the colony with Crowned Anthill milestone"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=json aether seal --plan-only $ARGUMENTS"
codex_orchestration:
  category: "semi-intelligent"
  skill: "aether-colony-build-cycle"
  guide: "aether command-guide seal --platform codex"
  drift_guard: "Update this YAML, Claude/OpenCode wrappers, the Codex skill, and cmd/command_guide.go together."
wrapper_contract:
  manifest: "result.seal_manifest"
  finalizer: "AETHER_OUTPUT_MODE=json aether seal-finalize --completion-file <file>"
  instructions: |
    1. Run `AETHER_OUTPUT_MODE=json aether seal --plan-only $ARGUMENTS` and save the full JSON envelope to a temporary manifest file outside `.aether/data/`.
    2. If the runtime returns blockers, surface them and stop.
    3. Parse `result.seal_manifest` and dispatch the listed final-review workers through the host platform.
    4. Render `AETHER_FORCE_COLOR=1 AETHER_OUTPUT_MODE=visual aether ceremony spawn-plan --workflow seal --manifest-file <manifest_file>` so the final-review stack appears before live reviewers.
    5. Use visible live Task/subagent panels as the final-review ceremony. Do not set `run_in_background`, do not describe reviewers as background agents, and do not replace the live stack with a markdown worker table.
    6. Before each manifest wave, render `AETHER_FORCE_COLOR=1 AETHER_OUTPUT_MODE=visual aether ceremony wave-start --workflow seal --manifest-file <manifest_file> --execution-wave <execution_wave>`.
    7. Call `aether spawn-log` before each worker and `aether spawn-complete` after each terminal result.
    8. After each terminal reviewer result, write that one result to a temporary JSON file and render `AETHER_OUTPUT_MODE=visual aether ceremony worker-complete --workflow seal --worker-file <worker_file>`.
    9. Each spawned reviewer description must be caste-labelled from the manifest: `{caste emoji} {Caste} {name}: {task}`.
    10. Write a completion packet containing `seal_manifest` plus terminal worker `dispatches`.
    11. Run `AETHER_OUTPUT_MODE=json aether seal-finalize --completion-file <file>`.
    12. After the JSON finalizer succeeds, run `AETHER_OUTPUT_MODE=visual aether ceremony closeout --workflow seal --completion-file <file>` for the user-facing ceremony.
    13. Follow the runtime's Porter readiness output from visual mode; do not deliver unless the user selects delivery actions.
guardrails:
  - "Do not write colony state files, session files, or pheromone files by hand from this command spec."
  - "Do not run `aether seal` without `--plan-only` from Claude/OpenCode orchestration unless the user explicitly asks for raw/no-orchestration."
  - "Do not run Porter delivery commands unless the user explicitly chooses them after seal-finalize."
  - "Do not describe platform reviewers as background agents or replace the live worker stack with a markdown table."
  - "If docs and runtime disagree, runtime wins."
