name: ant-build
description: "🔨 Build a phase — Queen dispatches workers, colony self-organizes"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=json aether build $ARGUMENTS --plan-only"
codex_orchestration:
  category: "full-orchestration"
  skill: "aether-colony-build-cycle"
  guide: "aether command-guide build --platform codex"
  drift_guard: "Update this YAML, Claude/OpenCode wrappers, the Codex skill, and cmd/command_guide.go together."
wrapper_additions:
  pre_build: |
    Ground the build before planning:
    1. Run `AETHER_OUTPUT_MODE=visual aether status` to see current colony state, phase progress, and active signals.
    2. Surface active pheromones as a compact steering block with REDIRECT first, then FOCUS, then FEEDBACK.
    3. Include strength or remaining-life context so the user understands why each signal matters right now.
    4. Frame the requested work as `Phase N of M — Name` with a one-line purpose.
    5. Immediately before requesting the manifest, say: `Asking the runtime for the dispatch manifest...`
  orchestration: |
    Restore real wrapper orchestration:
    1. Run `AETHER_OUTPUT_MODE=json aether build $ARGUMENTS --plan-only`.
    2. Parse `result.dispatch_manifest`; do not parse visual output.
    3. Immediately render the runtime-owned spawn ceremony for the user with `AETHER_FORCE_COLOR=1 AETHER_OUTPUT_MODE=visual aether build $ARGUMENTS --plan-only`; do not parse this output.
    4. Load the build-wave playbook from the installed hub (`~/.aether/system/docs/command-playbooks/build-wave.md`, or the matching dev hub when using `aether-dev`) as the spawning procedure.
    5. Use visible live Task/subagent panels as the worker ceremony: issue all parallel-wave Task calls in one assistant message, do not set `run_in_background`, and do not replace the live stack with a markdown worker table.
    6. For each step in `dispatch_manifest.execution_plan`, call `aether spawn-log`, spawn the matching platform agent (`subagent_type` / equivalent) using `agent_name`, inject that dispatch's runtime-provided `skill_section` when present, then call `aether spawn-complete`.
    7. Each spawned worker description must be exactly caste-labelled from the manifest: `{caste emoji} {Caste} {name}: {task}`. Preserve the platform agent's caste color/icon metadata.
    8. Collect terminal worker results into a completion JSON file containing the original `dispatch_manifest` and a `dispatches` array.
    9. Run `AETHER_OUTPUT_MODE=json aether build-finalize $ARGUMENTS --completion-file <file>` to record `dispatch_mode: external-task`, manifest, and claims.
    10. After the JSON finalizer succeeds, run `AETHER_OUTPUT_MODE=visual aether closeout build --completion-file <file>` for the user-facing ceremony.
    Note: The runtime accepts `--verification-depth <light|standard|heavy>` to control review depth during continue. This flag does not affect the build command itself but is passed through to subsequent continue review.
  post_build: |
    Close with a short colony-language synthesis:
    1. Run the visual closeout command first; use its next-step line as the source of truth.
    2. Summarize what moved forward and which workers/castes actually ran.
    3. Note only the most relevant signal or risk.
    4. Route first to `/ant-continue`, keeping `aether continue` as the runtime source of truth beneath the wrapper.
guardrails:
  - "Do NOT read or write colony state files by hand."
  - "Do NOT mutate COLONY_STATE.json, session.json, or pheromone files."
  - "Do NOT parse visual output as authoritative state."
  - "Do NOT run `aether build` without `--plan-only` from Claude/OpenCode wrapper orchestration."
  - "Do NOT run `aether build --synthetic` after real wrapper Task agents complete."
  - "Do NOT describe parallel workers as background agents or say you will be notified later; keep the live worker stack visible until terminal results return."
  - "Do NOT add extra option menus or recovery advice unless the runtime explicitly asks."
  - "If docs and runtime disagree, runtime wins."
follow_up:
  verify: "Guide the user first to `/ant-continue`, with `aether continue` as the runtime source of truth."
  inspect: "Run `aether status` if you want to inspect progress before advancing."
