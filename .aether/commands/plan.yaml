name: ant-plan
description: "📋 Generate a depth-scoped colony plan with real Scout and Route-Setter agents"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=json aether plan --plan-only --depth <fast|balanced|deep|exhaustive> --planning-depth <light|standard|deep>"
codex_orchestration:
  category: "full-orchestration"
  skill: "aether-colony-build-cycle"
  guide: "aether command-guide plan --platform codex"
  drift_guard: "Update this YAML, Claude/OpenCode wrappers, the Codex skill, and cmd/command_guide.go together."
wrapper_additions:
  depth_ceremony: |
    Prompt for planning depth before requesting the manifest:
    1. Fast — sprint granularity, 1-3 phases.
    2. Balanced — milestone granularity, 4-7 phases. Recommended default.
    3. Deep — quarter granularity, 8-12 phases.
    4. Exhaustive — major granularity, 13-20 phases.
    If `$ARGUMENTS` already contains a depth, use it and state the selected depth.
  planning_depth_ceremony: |
    After selecting planning depth (granularity), choose the task decomposition depth:
    1. Light — coarse tasks, 1-3 per plan with objective-level descriptions.
    2. Standard — normal task breakdown. Recommended default.
    3. Deep — granular subtasks including edge cases, error handling, and test coverage as separate tasks.
    This controls task detail within each plan, not how many phases are generated. If not specified, defaults to "standard".
  orchestration: |
    Restore real wrapper planning orchestration:
    1. Run `AETHER_OUTPUT_MODE=visual aether status`.
    2. Run `AETHER_OUTPUT_MODE=json aether plan --plan-only --depth <choice> --planning-depth <choice2>` for normal wrapper planning, or run the user's requested `aether plan --refresh` when refreshing an existing plan.
    3. Parse `result.plan_manifest` or `result.planning_manifest`; do not parse visual output.
    4. If the runtime reports `dispatch_mode: agent-delegate`, treat it as the same host-dispatch contract: do not run nested subprocess planning; dispatch the manifest workers through the current host platform and finish with `plan-finalize`.
    5. If the result reports `unresolved_clarifications` or `clarification_warning`, pause before spawning workers and route first to `/ant-discuss`; proceed with implicit assumptions only if the user explicitly chooses to continue.
    6. Spawn Scout from wave 1, then Route-Setter from wave 2, using manifest names, castes, task IDs, briefs, `agent_name`, and each dispatch's runtime-provided `skill_section` when present.
    7. Pass each dispatch's `brief` verbatim under a `Runtime Worker Brief` heading. The brief contains the read budget, no-repeat loop guard, output contract, and stop condition.
    8. For Route-Setter, include the Scout terminal result in the prompt so it can consume Scout findings directly instead of re-running the survey.
    9. If a planning worker keeps rereading the same file or command, stop waiting for more exploration and mark that worker `blocked` with a concrete blocker; do not manually reconcile it as completed.
    10. Call `aether spawn-log` before each worker and `aether spawn-complete` after each terminal result.
    11. Collect terminal worker results into a completion JSON file outside `.aether/data/`.
    12. Run `AETHER_OUTPUT_MODE=json aether plan-finalize --completion-file <file>` to let the runtime write canonical planning artifacts and state.
  post_plan: |
    Close from the `plan-finalize` result only:
    1. Summarize selected depth and planning depth, phase count, confidence, and which planning agents ran.
    2. Route first to `/ant-build 1` or the runtime-surfaced next build command.
    3. If finalization blocks, follow the runtime recovery command first.
guardrails:
  - "Do NOT run `aether plan` without `--plan-only` from Claude/OpenCode wrapper orchestration."
  - "Do NOT run `aether plan --synthetic` after real wrapper Task agents complete."
  - "Do NOT read or write colony state files, session files, planning artifacts, or pheromone files by hand from this command spec."
  - "Do NOT parse visual output as authoritative state."
  - "Do NOT invent Scout or Route-Setter names, castes, waves, or task IDs; use `plan_manifest`."
  - "If docs and runtime disagree, runtime wins."
