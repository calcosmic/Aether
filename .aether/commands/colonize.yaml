name: ant-colonize
description: "🗺️ Survey territory with visible platform Surveyor workers"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=json aether colonize --plan-only $ARGUMENTS"
codex_orchestration:
  category: "full-orchestration"
  skill: "aether-colony-build-cycle"
  guide: "aether command-guide colonize --platform codex"
  drift_guard: "Update this YAML, Claude/OpenCode wrappers, the Codex skill, and cmd/command_guide.go together."
wrapper_additions:
  orchestration: |
    Restore host-visible surveyor orchestration:
    1. Run `AETHER_OUTPUT_MODE=json aether colonize --plan-only $ARGUMENTS`.
    2. Parse `result.colonize_manifest`; do not parse visual output.
    3. Use visible live Task/subagent panels as the survey ceremony. Do not set `run_in_background`, do not describe surveyors as background agents, and do not replace the live stack with a markdown worker table.
    4. For each manifest dispatch, call `aether spawn-log`, spawn the matching platform agent (`subagent_type` / equivalent) using `agent_name`, inject the dispatch `brief`, `output_paths`, active signals, and `skill_section`, then call `aether spawn-complete`.
    5. Each spawned surveyor description must be caste-labelled from the manifest: `{caste emoji} {Caste} {name}: {task}`.
    6. Collect terminal surveyor results into a completion JSON file containing the original `colonize_manifest` and a `dispatches` array.
    7. Run `AETHER_OUTPUT_MODE=json aether colonize-finalize --completion-file <file>` to let the runtime write survey artifacts, spawn-tree status, session, and colony state.
    8. After the JSON finalizer succeeds, run `AETHER_OUTPUT_MODE=visual aether closeout colonize --completion-file <file>` for the user-facing ceremony.
  post_colonize: |
    Close from `colonize-finalize` output only:
    1. Run the visual closeout command first; use its next-step line as the source of truth.
    2. Summarize which surveyors actually ran and which survey files were written.
    3. Route first to `/ant-plan`, keeping `aether plan` as the runtime source of truth beneath the wrapper.
guardrails:
  - "Do NOT run nested subprocess surveyors from Claude/OpenCode wrapper orchestration."
  - "Do not write colony state files, session files, or pheromone files by hand from this command spec."
  - "Do not copy command wrappers into target repos; commands are published globally through the platform homes."
  - "Do NOT parse visual output as authoritative state."
  - "Do NOT run `aether colonize` without `--plan-only` from Claude/OpenCode wrapper orchestration unless the user explicitly asks for raw/no-orchestration."
  - "Do NOT describe platform surveyors as background agents or replace the live worker stack with a markdown table."
  - "If docs and runtime disagree, runtime wins."
