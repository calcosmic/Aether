name: ant-continue
description: "👁️ Verify build work, extract learnings, and advance the colony"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=visual aether continue --skip-watchers --verification-depth standard $ARGUMENTS"
codex_orchestration:
  category: "semi-intelligent"
  skill: "aether-colony-build-cycle"
  guide: "aether command-guide continue --platform codex"
  drift_guard: "Update this YAML, Claude/OpenCode wrappers, the Codex skill, and cmd/command_guide.go together."
wrapper_additions:
  pre_continue: |
    Ground continue before running the runtime-owned verification path:
    1. Run `AETHER_OUTPUT_MODE=visual aether status` to see current colony state, phase progress, and active signals.
    2. Frame continue as the colony's inspection point, not another build pass.
    3. Immediately run the default continue command unless the user explicitly requested `--verification-depth heavy` or `--heavy`.
  orchestration: |
    Default path:
    1. Run `AETHER_OUTPUT_MODE=visual aether continue --skip-watchers --verification-depth standard $ARGUMENTS`.
    2. Do not use plan-only, spawn wrapper workers, or call continue-finalize on the default path.

    Heavy external review path:
    1. Only when the user explicitly requested `--verification-depth heavy` or `--heavy`, or the runtime specifically asks for wrapper-spawned review workers, run `AETHER_OUTPUT_MODE=json aether continue --plan-only --verification-depth heavy $ARGUMENTS`.
    2. Parse `result.continue_manifest`; do not parse visual output.
    3. Use visible live Task/subagent panels as the heavy-review ceremony. Do not set `run_in_background`, do not describe reviewers as background agents, and do not replace the live stack with a markdown worker table.
    4. Pass each dispatch's runtime-provided `brief` verbatim. The brief includes read cache discipline; if a reviewer keeps re-reading the same unchanged file or artifact, stop waiting and mark that reviewer `blocked` with the concrete missing context.
    5. For each planned dispatch, call `aether spawn-log`, spawn the matching platform agent using `agent_name`, then call `aether spawn-complete`.
    6. Each spawned reviewer description must be caste-labelled from the manifest: `{caste emoji} {Caste} {name}: {task}`.
    7. Collect terminal worker results into a completion JSON file containing the original `continue_manifest` and a `dispatches` array.
    8. Run `AETHER_OUTPUT_MODE=json aether continue-finalize --completion-file <file>`.
    9. After the JSON finalizer succeeds, run `AETHER_OUTPUT_MODE=visual aether closeout continue --completion-file <file>` for the user-facing ceremony.
  post_continue: |
    Close from runtime output only:
    1. For the heavy external review path, run the visual closeout command first and use its next-step line as the source of truth.
    2. If the phase advanced, summarize what was verified, which review workers ran, what the colony learned, and route first to `/ant-build N+1`.
    3. If continue blocked, translate the blocker into plain language and follow the runtime's recovery command first when it surfaces one; only fall back to `/ant-continue` when the runtime stayed generic.
    4. If the colony completed, mark the achievement briefly and route first to `/ant-seal`.
    5. Mention signal housekeeping only if the runtime surfaced it, and keep that note to one short line.
    6. When signal housekeeping appears, explain what expired, what remained active, and what that means for the next phase or final seal without diffing pheromone files directly.
  verification_depth_ceremony: |
    Verification depth controls how thorough the continue review is. Three levels:
    - light: Skip all review agents (fastest, minimal safety net)
    - standard: Probe-only review (default, watcher + probe coverage)
    - heavy: Full quality gauntlet (gatekeeper + auditor + probe)
    The default is "standard" for intermediate phases. Final phases default to "heavy" when depth is automatic.
    Users can override any automatic depth, including final phases, with --verification-depth <light|standard|heavy>.
guardrails:
  - "Do NOT use `--plan-only` or `continue-finalize` for default fast continue."
  - "Do NOT run `aether continue --synthetic` after real wrapper Task agents complete."
  - "Do NOT replay verification loops or reimplement runtime gate logic."
  - "Do NOT read or write colony state files by hand."
  - "Do NOT mutate COLONY_STATE.json, session.json, CONTEXT.md, or HANDOFF.md directly."
  - "Do NOT parse visual output as authoritative state."
  - "Do NOT invent worker names, castes, or waves; use `continue_manifest`."
  - "Do NOT describe platform reviewers as background agents or replace the live worker stack with a markdown table."
  - "Do NOT let reviewers loop on unchanged file reads; pass their brief verbatim and mark stuck reviewers blocked with the missing context."
  - "Do NOT add extra option menus or manual state surgery unless the runtime explicitly asks."
  - "If docs and runtime disagree, runtime wins."
follow_up:
  advance: "Guide the user first to `/ant-build N+1`, with `aether build <next_phase>` remaining the runtime source of truth beneath the wrapper."
  blocked: "Guide the user through the runtime-surfaced recovery command first; only route back to `/ant-continue` when the runtime has no more specific recovery step."
  complete: "Guide the user first to `/ant-seal`, with `aether seal` remaining the runtime source of truth beneath the wrapper."
