name: ant-shelf-promote
description: "Promote a shelf item into a colony goal or todo"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=visual aether shelf-promote $ARGUMENTS"
guardrails:
  - "Do not edit `.aether/data/shelf.json` by hand from this command spec."
  - "Use the runtime help for `shelf-promote` as the source of truth for flags and behavior."
  - "If docs and runtime disagree, runtime wins."
