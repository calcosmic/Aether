name: ant-swarm
description: "🔥 Real-time colony swarm display + visible bug-destroyer workers"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=json aether swarm --plan-only $ARGUMENTS"
codex_orchestration:
  category: "full-orchestration"
  skill: "aether-colony-build-cycle"
  guide: "aether command-guide swarm --platform codex"
  drift_guard: "Update this YAML, Claude/OpenCode wrappers, the Codex skill, and cmd/command_guide.go together."
wrapper_additions:
  watch: |
    Keep live visibility direct:
    - If the user provides no problem description, run `AETHER_OUTPUT_MODE=visual aether swarm --watch`.
    - Do not request a manifest for watch mode.
  orchestration: |
    Restore host-visible bug-destroyer orchestration:
    1. Run `AETHER_OUTPUT_MODE=json aether swarm --plan-only $ARGUMENTS` and save the full JSON envelope to a temporary manifest file outside `.aether/data/`.
    2. Parse `result.swarm_manifest`; do not parse visual output.
    3. Render `AETHER_FORCE_COLOR=1 AETHER_OUTPUT_MODE=visual aether ceremony spawn-plan --workflow swarm --manifest-file <manifest_file>` so the bug-destroyer stack appears before live workers.
    4. Use visible live Task/subagent panels as the swarm ceremony. Do not set `run_in_background`, do not describe swarm workers as background agents, and do not replace the live stack with a markdown worker table.
    5. Before each manifest wave, render `AETHER_FORCE_COLOR=1 AETHER_OUTPUT_MODE=visual aether ceremony wave-start --workflow swarm --manifest-file <manifest_file> --execution-wave <execution_wave>`.
    6. For each manifest dispatch, call `aether spawn-log`, spawn the matching platform agent (`subagent_type` / equivalent) using `agent_name`, inject the dispatch `brief`, `response_contract`, active signals, and exact task metadata, then call `aether spawn-complete`.
    7. After each terminal worker result, write that one result to a temporary JSON file and render `AETHER_OUTPUT_MODE=visual aether ceremony worker-complete --workflow swarm --worker-file <worker_file>`.
    8. Each spawned worker description must be caste-labelled from the manifest: `{caste emoji} {Caste} {name}: {task}`.
    9. Preserve the runtime wave order: investigation workers in wave 1 may run together, builder wave 2 waits for wave 1 summaries, watcher wave 3 waits for builder completion.
    10. Collect terminal worker results into a completion JSON file containing the original `swarm_manifest` and a `dispatches` array.
    11. Run `AETHER_OUTPUT_MODE=json aether swarm-finalize --completion-file <file>` to let the runtime write swarm artifacts, spawn-tree status, and the final result.
    12. After the JSON finalizer succeeds, run `AETHER_OUTPUT_MODE=visual aether ceremony closeout --workflow swarm --completion-file <file>` for the user-facing ceremony.
  post_swarm: |
    Close from `swarm-finalize` output only:
    1. Run the visual closeout command first; use its next-step line as the source of truth.
    2. Summarize which workers actually ran, the root cause, the fix or blocker, and verification evidence.
    3. Route first to the runtime-surfaced next command.
guardrails:
  - "Do NOT run nested subprocess swarm workers from Claude/OpenCode wrapper orchestration."
  - "Do not write colony state files, session files, or pheromone files by hand from this command spec."
  - "Do not copy command wrappers into target repos; commands are published globally through the platform homes."
  - "Do NOT parse visual output as authoritative state."
  - "Do NOT run `aether swarm` without `--plan-only` from Claude/OpenCode bug-destroyer orchestration unless the user explicitly asks for raw/no-orchestration."
  - "Do NOT describe platform workers as background agents or replace the live worker stack with a markdown table."
  - "If docs and runtime disagree, runtime wins."
