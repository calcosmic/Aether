name: ant-oracle
description: "🔮 Run the autonomous Oracle loop through the Aether CLI runtime"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=visual aether oracle $ARGUMENTS"
codex_orchestration:
  category: "full-orchestration"
  skill: "aether-colony-research"
  guide: "aether command-guide oracle --platform codex"
  drift_guard: "Update this YAML, Claude/OpenCode wrappers, the Codex skill, and cmd/command_guide.go together."
intent_refinement:
  - "If the user provides a research topic, do a short AI-led scoping pass before running the runtime command."
  - "Ask one compact batch of 3-6 questions when scope, audience, desired output, constraints, or decision criteria are unclear."
  - "Synthesize the user's answers into a precise research prompt. Do not pass the raw vague prompt through unchanged."
  - "Infer the Oracle template from intent: PRD/requirements/user stories -> --template prd; technology comparison -> --template tech-eval; architecture/design -> --template architecture-review; bug/root-cause -> --template bug-investigation; best practices/conventions -> --template research-brief."
  - "For PRD-style work, the command wrapper owns the user interview. The PRD reference/template structures the synthesis; it is not a separate manual command the user must run."
  - "Present research depth as selectable options unless the user already gave one: quick (5 iterations), balanced/standard (15), deep (30), or exhaustive/marathon (50). Do not hide this behind a raw flag-only flow."
  - "If the user gives an exact iteration cap, pass `--max-iterations <1-50>`."
  - "Ask the user to choose target confidence unless they already gave one: 80%, 90%, 95% recommended, or 99%; pass the selected number as `--confidence-target <percent>`."
  - "For long OpenCode-hosted runs, prefer `--background`; Oracle detaches a controller, preserves `.aether/oracle` state, and reports progress through `aether oracle status`."
  - "If the user asks for 'everything', 'all of the above', a full-system audit, or a large uncommitted diff review, split the work into focused Oracle prompts or run an explicit quick triage first with `--depth quick`; do not collapse every area into one blocking balanced-depth prompt."
  - "Run `AETHER_OUTPUT_MODE=visual aether oracle --depth <depth> --confidence-target <percent> --template <template> --background \"<synthesized prompt>\"` after the user confirms the refined prompt for long-running research. Omit `--background` only when the user explicitly wants foreground execution."
guardrails:
  - "Do not write colony state files, session files, or pheromone files by hand from this command spec."
  - "If docs and runtime disagree, runtime wins."
  - "If the shell/tool call times out, immediately run `aether oracle status` and report the runtime status; do not assume Oracle failed or bypass it with ad hoc agents."
  - "If OpenCode subprocess dispatch is unavailable, let Oracle use its automatic Codex/Claude fallback unless the user explicitly set `AETHER_WORKER_PLATFORM=opencode`."
follow_up:
  persistence: "After oracle completes, suggest persisting high-value findings as pheromone signals (aether pheromone-write) or hive wisdom (aether hive-store). User approves each suggestion."
