name: ant-oracle
description: "🔮 Run the autonomous Oracle loop through the Aether CLI runtime"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=visual aether oracle $ARGUMENTS"
guardrails:
  - "Do not write colony state files, session files, or pheromone files by hand from this command spec."
  - "If docs and runtime disagree, runtime wins."
follow_up:
  persistence: "After oracle completes, suggest persisting high-value findings as pheromone signals (aether pheromone-write) or hive wisdom (aether hive-store). User approves each suggestion."
